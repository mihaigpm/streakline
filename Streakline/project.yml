name: Streakline
options:
  bundleIdPrefix: com.mihaigarda
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_LANGUAGE: en
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  Streakline:
    type: application
    platform: iOS
    sources:
      - path: Streakline
    info:
      path: Streakline/Info.plist
      properties:
        CFBundleDisplayName: Streakline
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mihaigarda.threshold
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # iPhone-only (portrait). Set at target level so it overrides xcodegen's 1,2 default.
        TARGETED_DEVICE_FAMILY: "1"
