# Streakline landing page — nginx site config.
# Serves the static Next.js export (output: "export", trailingSlash: true).
#
# Install:
#   cp deploy/nginx.conf /etc/nginx/sites-available/streakline
#   ln -s /etc/nginx/sites-available/streakline /etc/nginx/sites-enabled/streakline
#   nginx -t && systemctl reload nginx
#
# certbot --nginx will add the TLS/443 server block and an HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name streakline.fit www.streakline.fit;

    root /var/www/streakline;
    index index.html;

    # Security + correctness headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed build assets never change — cache them hard.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static media / icons.
    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # trailingSlash: true -> "/privacy/" resolves to "/privacy/index.html".
    # Fall back to the .html sibling, then 404.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
}
